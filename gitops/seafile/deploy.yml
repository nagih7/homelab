---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: seafile-pvc
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 100Gi
  volumeName: seafile-pv

---
# 2. Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: seafile
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: seafile
  template:
    metadata:
      labels:
        app: seafile
    spec:
      containers:
        - name: seafile
          image: seafileltd/seafile-mc:latest
          ports:
            - containerPort: 80
          env:
            - name: DB_HOST
              value: "shared-postgres-service.shared-services.svc.cluster.local"
            - name: DB_USER
              value: "seafile"
            - name: DB_PASSWORD
              value: "seafile_db_pass" # Đã khớp với Ansible
            - name: SEAFILE_ADMIN_EMAIL
              value: "nooblearn2code@gmail.com"
            - name: SEAFILE_ADMIN_PASSWORD
              value: "Vmn.2005"
            - name: SEAFILE_SERVER_HOSTNAME
              value: "seafile.nooblearn2code.com"
          volumeMounts:
            - name: seafile-data
              mountPath: /shared
      volumes:
        - name: seafile-data
          persistentVolumeClaim:
            claimName: seafile-data-pvc

---
# 3. Service & IngressRoute (Traefik)
apiVersion: v1
kind: Service
metadata:
  name: seafile-service
  namespace: default
spec:
  selector:
    app: seafile
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: seafile-ingress
  namespace: default
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`seafile.nooblearn2code.com`)
      kind: Rule
      services:
        - name: seafile-service
          port: 80
