---
- name: Create Traefik configuration directory
  ansible.builtin.file:
    path: "{{ traefik_config_dir }}"
    state: directory
    mode: '0755'
  tags: traefik

- name: Create Traefik dynamic configuration directory
  ansible.builtin.file:
    path: "{{ traefik_dynamic_config_dir }}"
    state: directory
    mode: '0755'
  tags: traefik

- name: Create Traefik Let's Encrypt directory
  ansible.builtin.file:
    path: "{{ acme_dir }}"
    state: directory
    mode: '0600'
  tags: traefik

- name: Create acme.json file
  ansible.builtin.file:
    path: "{{ acme_dir }}/acme.json"
    state: touch
    mode: '0600'
  tags: traefik

- name: Deploy Traefik static configuration
  ansible.builtin.template:
    src: traefik/traefik.yml.j2
    dest: "{{ traefik_config_dir }}/traefik.yml"
    mode: '0644'
  notify: Restart Traefik
  tags: traefik

- name: Deploy Traefik dynamic configuration for non-Docker services
  ansible.builtin.template:
    src: traefik/dynamic-services.yml.j2
    dest: "{{ traefik_dynamic_config_dir }}/services.yml"
    mode: '0644'
  notify: Restart Traefik
  tags: traefik

- name: Remove Let's Encrypt acme.json when using Cloudflare
  ansible.builtin.file:
    path: "{{ acme_dir }}/acme.json"
    state: absent
  when: cloudflare_proxy_enabled | default(false)
  tags: traefik

- name: Create Cloudflare certificates directory
  ansible.builtin.file:
    path: "{{ cloudflare_origin_cert_dir }}"
    state: directory
    mode: '0700'
  when: cloudflare_origin_cert_enabled | default(false)
  tags: traefik

- name: Deploy Cloudflare Origin certificate
  ansible.builtin.copy:
    src: secrets/cloudflare-origin-cert.pem
    dest: "{{ cloudflare_origin_cert_file }}"
    mode: '0600'
  when: cloudflare_origin_cert_enabled | default(false)
  notify: Restart Traefik
  tags: traefik

- name: Deploy Cloudflare Origin private key
  ansible.builtin.copy:
    src: secrets/cloudflare-origin-key.pem
    dest: "{{ cloudflare_origin_key_file }}"
    mode: '0600'
  when: cloudflare_origin_cert_enabled | default(false)
  notify: Restart Traefik
  tags: traefik

- name: Deploy Cloudflare TLS configuration
  ansible.builtin.template:
    src: traefik/cloudflare-tls.yml.j2
    dest: "{{ traefik_dynamic_config_dir }}/cloudflare-tls.yml"
    mode: '0644'
  when: cloudflare_origin_cert_enabled | default(false)
  notify: Restart Traefik
  tags: traefik

- name: Deploy Traefik Docker Compose file
  ansible.builtin.template:
    src: traefik/compose.yml.j2
    dest: "{{ traefik_config_dir }}/compose.yml"
    mode: '0644'
  notify: Restart Traefik
  tags: traefik

- name: Pull Traefik image (with retry for network issues)
  community.docker.docker_image:
    name: "{{ traefik_image }}"
    source: pull
  register: pull_result
  retries: 3
  delay: 10
  until: pull_result is succeeded
  tags: traefik

- name: Ensure Traefik container is running
  community.docker.docker_compose_v2:
    project_src: "{{ traefik_config_dir }}"
    state: present
  register: traefik_output
  tags: traefik

- name: Wait for Traefik to be healthy
  ansible.builtin.uri:
    url: "http://localhost:{{ traefik_http_port }}/ping"
    status_code: 200
  retries: 5
  delay: 3
  register: result
  until: result.status == 200
  tags: traefik
