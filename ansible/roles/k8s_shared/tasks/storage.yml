---
- name: Deploy Shared Data Services (Postgres & Redis)
  delegate_to: localhost
  become: false
  tags: k8s-storage
  block:
    - name: Create shared-services namespace
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: shared-services

    - name: Deploy Shared Secrets
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: shared-db-secrets
            namespace: shared-services
          type: Opaque
          stringData:
            postgres-password: "{{ postgres_root_password }}"
            redis-password: "{{ redis_password }}"

    # ================= REDIS 8 =================
    - name: Deploy Redis Deployment
      kubernetes.core.k8s:
        state: present
        definition: |
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: shared-redis
            namespace: shared-services
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: shared-redis
            template:
              metadata:
                labels:
                  app: shared-redis
              spec:
                containers:
                - name: redis
                  image: redis:8-alpine
                  command:
                    - "redis-server"
                    - "--requirepass"
                    - "$(REDIS_PASSWORD)"
                    - "--appendonly"
                    - "yes"
                  env:
                  - name: REDIS_PASSWORD
                    valueFrom:
                      secretKeyRef:
                        name: shared-db-secrets
                        key: redis-password
                  ports:
                  - containerPort: 6379
                  volumeMounts:
                  - name: redis-data
                    mountPath: /data
                volumes:
                - name: redis-data
                  persistentVolumeClaim:
                    claimName: redis-data-pvc
          ---
          apiVersion: v1
          kind: PersistentVolumeClaim
          metadata:
            name: redis-data-pvc
            namespace: shared-services
          spec:
            accessModes: [ReadWriteOnce]
            storageClassName: local-path
            resources:
              requests:
                storage: 2Gi
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: shared-redis-service
            namespace: shared-services
          spec:
            selector:
              app: shared-redis
            ports:
              - port: 6379
                targetPort: 6379

    # ================= POSTGRESQL 18 =================
    - name: Deploy PostgreSQL StatefulSet
      kubernetes.core.k8s:
        state: present
        definition: |
          apiVersion: apps/v1
          kind: StatefulSet
          metadata:
            name: shared-postgres
            namespace: shared-services
          spec:
            serviceName: shared-postgres-service
            replicas: 1
            selector:
              matchLabels:
                app: shared-postgres
            template:
              metadata:
                labels:
                  app: shared-postgres
              spec:
                containers:
                - name: postgres
                  image: postgres:18-alpine
                  env:
                  - name: POSTGRES_USER
                    value: "{{ postgres_root_user }}"
                  - name: POSTGRES_PASSWORD
                    valueFrom:
                      secretKeyRef:
                        name: shared-db-secrets
                        key: postgres-password
                  - name: PGDATA
                    value: /var/lib/postgresql/data/pgdata
                  ports:
                  - containerPort: 5432
                  volumeMounts:
                  - name: postgres-data
                    mountPath: /var/lib/postgresql/data
                volumes:
                - name: postgres-data
                  persistentVolumeClaim:
                    claimName: postgres-data-pvc
          ---
          apiVersion: v1
          kind: PersistentVolumeClaim
          metadata:
            name: postgres-data-pvc
            namespace: shared-services
          spec:
            accessModes: [ReadWriteOnce]
            storageClassName: local-path
            resources:
              requests:
                storage: 20Gi
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: shared-postgres-service
            namespace: shared-services
          spec:
            type: NodePort
            selector:
              app: shared-postgres
            ports:
              - port: 5432
                targetPort: 5432
                nodePort: 32543

    # ================= ĐỢI K3S ĐẺ XONG POSTGRES =================
    - name: Wait for PostgreSQL Pod to be ready
      kubernetes.core.k8s_info:
        kind: Pod
        namespace: shared-services
        label_selectors:
          - app=shared-postgres
      register: pg_pod
      until: "pg_pod.resources | length > 0 and pg_pod.resources[0].status.phase == 'Running'"
      retries: 15
      delay: 5

    # ================= TẠO DATABASE BẰNG IAC =================
    - name: Create Application Users for PostgreSQL Databases
      community.postgresql.postgresql_user:
        name: "{{ item.user }}"
        password: "{{ item.password }}"
        # Trỏ vào IP Tailscale của con K3s (worker-1 hoặc worker-2 đều được)
        login_host: "{{ hostvars[postgres_node]['ansible_host'] }}" # Hoặc điền thẳng IP Tailscale vào đây
        login_port: "32543" # Port mình vừa khoét ở trên
        login_user: "{{ postgres_root_user }}"
        login_password: "{{ postgres_root_password }}"
        state: present
      loop: "{{ postgres_databases }}"
      tags: database

    - name: Create PostgreSQL Databases
      community.postgresql.postgresql_db:
        name: "{{ item.name }}"
        owner: "{{ item.user }}"
        login_host: "{{ hostvars[postgres_node]['ansible_host'] }}"
        login_port: "32543"
        login_user: "{{ postgres_root_user }}"
        login_password: "{{ postgres_root_password }}"
        state: present
      loop: "{{ postgres_databases }}"
      tags: database
