---
# ========== General Proxy Configuration ==========
base_domain: nooblearn2code.com
edge_dir: "/opt/edge-proxy"
acme_dir: "{{ edge_dir }}/acme"
letsencrypt_dir: "{{ acme_dir }}/letsencrypt"

# ========== Traefik Configuration =========
traefik_version: "latest"
traefik_container: traefik
traefik_image: "traefik:{{ traefik_version }}"

traefik_config_dir: "{{ edge_dir }}/traefik"
traefik_dynamic_config_dir: "{{ traefik_config_dir }}/dynamic"

traefik_acme_email: "nooblearn2code@gmail.com"
traefik_dashboard_enabled: true
traefik_dashboard_domain: "traefik.nooblearn2code.com"

# Ports
traefik_http_port: 80
traefik_https_port: 443
traefik_dashboard_port: 8080

# Resources
traefik_memory_limit: 256M
traefik_cpu_limit: "0.5"
traefik_memory_reservation: 128M
traefik_cpu_reservation: "0.1"

# ========== Cloudflare Configuration ==========

# Cloudflare Origin Certificates Configuration
cloudflare_config_dir: "{{ edge_dir }}/cloudflare"
cloudflare_proxy_enabled: false
cloudflare_origin_cert_enabled: false
cloudflare_email: nooblearn2code@gmail.com

# Origin certificate paths (will be deployed via Ansible)
cloudflare_origin_cert_dir: "{{ edge_dir }}/cloudflare-certs"
cloudflare_origin_cert_file: "{{ cloudflare_origin_cert_dir }}/cert.pem"
cloudflare_origin_key_file: "{{ cloudflare_origin_cert_dir }}/key.pem"

# Cloudflare origin domains (wildcard recommended)
cloudflare_origin_domains:
  - "*.nooblearn2code.com"
  - "nooblearn2code.com"

# ========== Cloudflare Tunnel Configuration =========
cloudflare_tunnel_config_dir: "{{ edge_dir }}/cloudflare-tunnel"
cloudflare_tunnel_enabled: true
cloudflare_tunnel_version: "latest"
cloudflare_tunnel_image: "cloudflare/cloudflared:{{ cloudflare_tunnel_version }}"
cloudflare_tunnel_container: cloudflared-tunnel
cloudflare_tunnel_id: e32cb21a-6b8b-45dd-be2c-3f7af3546777

# ========== Cloudflare DDNS Configuration ==========
cloudflare_ddns_config_dir: "{{ edge_dir }}/cloudflare-ddns"
cloudflare_ddns_enabled: true
cloudflare_ddns_version: "latest"
cloudflare_ddns_image: "oznu/cloudflare-ddns:{{ cloudflare_ddns_version }}"
cloudflare_ddns_container: cloudflare-ddns
cloudflare_ddns_api_key: ZkTo0L1N0YlcYP7JMzStCcmNoZuiGvv5CeeR-XH-
cloudflare_ddns_zone: "{{ base_domain }}"
cloudflare_ddns_subdomain: "gateway"
