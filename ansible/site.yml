---
- hosts: all
  become: true
  roles:
    - { role: bootstrap, tags: bootstrap }

- hosts: reverse-proxy, minecraft-server
  become: true
  roles:
    - { role: docker, tags: docker }

- hosts: reverse-proxy
  become: true
  roles:
    - { role: proxy, tags: proxy }

- hosts: minecraft-server
  become: true
  roles:
    - { role: backup, tags: backup }
    - { role: minecraft, tags: minecraft }

- name: Setup K8s Cluster (K3s)
  hosts: k8s_cluster
  tags: k8s-cluster
  roles:
    - { role: k8s_bootstrap, tags: k8s-bootstrap }

- name: Setup K3s Control Plane
  hosts: k8s_master
  tags: k8s-cluster
  roles:
    - { role: k8s_master, tags: k8s-master }
    - { role: k8s_addons, tags: k8s-addons }
    - { role: k8s_shared, tags: k8s-shared }
    - { role: k8s_gitlab, tags: k8s-gitlab }

- name: Setup K3s Workers
  hosts: k8s_worker
  tags: k8s-cluster
  roles:
    - { role: k8s_worker }
